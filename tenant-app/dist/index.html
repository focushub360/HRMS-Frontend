  <body>
    <div id="root"></div>
    <!-- Runtime API base URL override: only set in non-localhost hosts so deployed
         builds can be fixed without a rebuild. This will be used by constants.js
         when import.meta.env.VITE_API_URL is not present. -->
    <script>
      (function(){
        try {
          if (typeof window !== 'undefined' && !window.__API_BASE_URL) {
            var host = location.hostname;
            if (host !== 'localhost' && host !== '127.0.0.1') {
              window.__API_BASE_URL = 'https://hrm-backend-axau.onrender.com/api';
            }
          }
        } catch (e) {
          // noop
        }
      })();
    </script>
